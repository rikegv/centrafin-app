<!DOCTYPE html>
<html class="light" lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login - CentraFin SaaS</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#aad12f",
                        secondary: "#002443",
                        "surface-low": "#f8f9fb",
                    },
                    fontFamily: {
                        headline: ["Manrope", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        h1,
        h2,
        h3,
        .font-headline {
            font-family: 'Manrope', sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .floating-logo {
            filter: drop-shadow(0 25px 25px rgba(0, 0, 0, 0.5)) drop-shadow(0 10px 10px rgba(0, 0, 0, 0.3));
            animation: levitate 5s ease-in-out infinite;
            will-change: transform, filter;
        }

        @keyframes levitate {

            0%,
            100% {
                transform: translateY(0);
                filter: drop-shadow(0 25px 25px rgba(0, 0, 0, 0.5)) drop-shadow(0 10px 10px rgba(0, 0, 0, 0.3));
            }

            50% {
                transform: translateY(-15px);
                filter: drop-shadow(0 40px 35px rgba(0, 0, 0, 0.3)) drop-shadow(0 15px 15px rgba(0, 0, 0, 0.2));
            }
        }
    </style>
</head>

<body
    class="min-h-screen flex items-center justify-center bg-gradient-to-br from-secondary to-[#003b6d] relative overflow-hidden p-4">
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-primary/20 rounded-full blur-[100px] pointer-events-none">
    </div>
    <div
        class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-blue-500/10 rounded-full blur-[120px] pointer-events-none">
    </div>

    <div class="w-full max-w-md relative z-10 fade-in-up flex flex-col items-center">
        <div class="text-center mb-10 flex flex-col items-center w-full">
            <img src="assets/logo.png.png" alt="Logo CentraFin" class="h-48 w-auto object-contain mb-4 floating-logo"
                onerror="this.src='https://via.placeholder.com/400x120?text=CentraFin'" />
            <p class="text-blue-200/80 text-sm font-medium uppercase tracking-widest mt-2">Acesso Restrito</p>
        </div>

        <div class="glass-card rounded-3xl shadow-2xl p-8 w-full">
            <h2 class="font-headline text-xl font-bold text-slate-800 mb-6 text-center">Faça seu Login</h2>
            <form id="form-login" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1 uppercase tracking-wider">E-mail
                        Corporativo</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">mail</span>
                        <input type="email" id="campo-email" required
                            class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-300"
                            placeholder="nome@empresa.com.br">
                    </div>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider">Senha</label>
                        <a href="#"
                            class="text-[10px] font-bold text-blue-600 hover:text-blue-700 transition-colors">Esqueceu a
                            senha?</a>
                    </div>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">lock</span>
                        <input type="password" id="campo-senha" required
                            class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-300"
                            placeholder="••••••••">
                    </div>
                </div>
                <div id="mensagem-erro"
                    class="hidden bg-red-50 border border-red-100 text-red-600 text-xs font-bold p-3 rounded-lg flex items-center gap-2">
                    <span class="material-symbols-outlined text-base shrink-0">error</span>
                    <span id="texto-erro">Usuário ou senha incorretos.</span>
                </div>
                <button type="submit" id="btn-entrar"
                    class="w-full py-3.5 mt-2 bg-primary text-secondary font-extrabold rounded-xl shadow-lg shadow-primary/30 hover:brightness-105 active:scale-95 transition-all flex items-center justify-center gap-2">
                    <span>Acessar Sistema</span>
                    <span class="material-symbols-outlined text-lg" id="icon-entrar">login</span>
                </button>
            </form>
        </div>
        <p class="text-center text-blue-200/50 text-[10px] mt-10 font-medium">&copy; 2026 CentraFin System. Todos os
            direitos reservados.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAHy6pN_agZ4DZDPDmJ580tUF4iTgX2siU",
            authDomain: "centra-fin.firebaseapp.com",
            projectId: "centra-fin",
            storageBucket: "centra-fin.firebasestorage.app",
            messagingSenderId: "666471089411",
            appId: "1:666471089411:web:4630f5b2ced70ceb981536"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const formLogin = document.getElementById('form-login');
        const btnEntrar = document.getElementById('btn-entrar');
        const iconEntrar = document.getElementById('icon-entrar');
        const msgErro = document.getElementById('mensagem-erro');
        const txtErro = document.getElementById('texto-erro');

        formLogin.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('campo-email').value.trim();
            const senha = document.getElementById('campo-senha').value;

            btnEntrar.disabled = true;
            btnEntrar.classList.add('opacity-70');
            iconEntrar.textContent = 'hourglass_empty';
            msgErro.classList.add('hidden');

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, senha);
                const user = userCredential.user;
                const docRef = doc(db, "Usuarios", user.uid);
                const docSnap = await getDoc(docRef);

                iconEntrar.textContent = 'check_circle';

                setTimeout(() => {
                    if (docSnap.exists()) {
                        const status = docSnap.data().status;
                        if (status === 'inativo') {
                            auth.signOut();
                            msgErro.classList.remove('hidden');
                            txtErro.textContent = "Acesso bloqueado. Contate o administrador.";
                            btnEntrar.disabled = false;
                            btnEntrar.classList.remove('opacity-70');
                            iconEntrar.textContent = 'login';
                            return;
                        }

                        if (docSnap.data().perfil === 'master') {
                            window.location.href = "dashboard_master_desktop/code.html";
                        } else {
                            window.location.href = "contas_a_receber_desktop/code.html";
                        }
                    } else {
                        window.location.href = "contas_a_receber_desktop/code.html";
                    }
                }, 1000);

            } catch (error) {
                msgErro.classList.remove('hidden');
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    txtErro.textContent = "E-mail ou senha incorretos.";
                } else if (error.code === 'auth/operation-not-allowed') {
                    txtErro.textContent = "O Login por E-mail/Senha não está ativado no Firebase Console!";
                } else {
                    txtErro.textContent = `Erro do Servidor: ${error.code}`;
                }
                btnEntrar.disabled = false;
                btnEntrar.classList.remove('opacity-70');
                iconEntrar.textContent = 'login';
            }
        });
    </script>
</body>

</html>
