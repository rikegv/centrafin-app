<!DOCTYPE html>
<html class="light" lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login - CentraFin SaaS</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#aad12f",
                        secondary: "#002443",
                        "surface-low": "#f8f9fb",
                    },
                    fontFamily: {
                        headline: ["Manrope", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        h1,
        h2,
        h3,
        .font-headline {
            font-family: 'Manrope', sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .floating-logo {
            filter: drop-shadow(0 25px 25px rgba(0, 0, 0, 0.5)) drop-shadow(0 10px 10px rgba(0, 0, 0, 0.3));
            animation: levitate 5s ease-in-out infinite;
            will-change: transform, filter;
        }

        @keyframes levitate {

            0%,
            100% {
                transform: translateY(0);
                filter: drop-shadow(0 25px 25px rgba(0, 0, 0, 0.5)) drop-shadow(0 10px 10px rgba(0, 0, 0, 0.3));
            }

            50% {
                transform: translateY(-15px);
                filter: drop-shadow(0 40px 35px rgba(0, 0, 0, 0.3)) drop-shadow(0 15px 15px rgba(0, 0, 0, 0.2));
            }
        }
    </style>
</head>

<body
    class="min-h-screen flex items-center justify-center bg-gradient-to-br from-secondary to-[#003b6d] relative overflow-hidden p-4">
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-primary/20 rounded-full blur-[100px] pointer-events-none">
    </div>
    <div
        class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-blue-500/10 rounded-full blur-[120px] pointer-events-none">
    </div>

    <div class="w-full max-w-md relative z-10 fade-in-up flex flex-col items-center">
        <div class="text-center mb-10 flex flex-col items-center w-full">
            <img src="assets/logo.png.png" alt="Logo CentraFin" class="h-48 w-auto object-contain mb-4 floating-logo"
                onerror="this.src='https://via.placeholder.com/400x120?text=CentraFin'" />
            <p class="text-blue-200/80 text-sm font-medium uppercase tracking-widest mt-2">Acesso Restrito</p>
        </div>

        <!-- Card de Login Premium -->
        <div
            class="bg-gradient-to-br from-[#aad12f] to-[#8eb025] shadow-[0_20px_60px_rgba(170,209,47,0.3)] border border-[#aad12f]/50 rounded-3xl p-8 w-full">
            <h2 class="font-headline text-xl font-bold text-[#002443] mb-2 text-center text-secondary">Bem-vindo de
                volta</h2>
            <p class="text-[#002443]/70 text-center text-xs mb-8">Utilize sua conta corporativa para acessar o painel
                financeiro.</p>

            <div class="space-y-6">
                <!-- Google Login Button (Elegante e Centralizado) -->
                <button id="btn-google"
                    class="w-fit mx-auto px-6 py-2.5 bg-white text-slate-700 font-bold text-sm rounded-full shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all flex items-center justify-center gap-3 active:scale-[0.98] outline-none group">
                    <div class="bg-white p-0.5 rounded-sm shrink-0">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M19.642 10.2307C19.642 9.51279 19.5779 8.82048 19.4586 8.15381H10V12.0854H15.4037C15.1702 13.3444 14.4601 14.4111 13.3934 15.1246V17.6719H16.6502C18.5552 15.9179 19.642 13.3169 19.642 10.2307Z"
                                fill="#4285F4" />
                            <path
                                d="M10 20.0001C12.7 20.0001 14.9634 19.1025 16.6502 17.6719L13.3934 15.1246C12.491 15.7289 11.3431 16.0855 10 16.0855C7.39002 16.0855 5.18247 14.3223 4.39487 11.9488H1.03757V14.5513C2.6974 17.8462 6.08027 20.0001 10 20.0001Z"
                                fill="#34A853" />
                            <path
                                d="M4.39487 11.9488C4.19342 11.3444 4.0789 10.7023 4.0789 10.0385C4.0789 9.37467 4.19342 8.73256 4.39487 8.12817V5.52563H1.03757C0.375429 6.88458 0 8.41663 0 10.0385C0 11.6603 0.375429 13.1923 1.03757 14.5513L4.39487 11.9488Z"
                                fill="#FBBC05" />
                            <path
                                d="M10 3.91459C11.4684 3.91459 12.7874 4.41843 13.8222 5.40827L16.7235 2.50699C14.9588 0.861111 12.6954 0 10 0C6.08027 0 2.6974 2.15385 1.03757 5.44872L4.39487 8.05128C5.18247 5.67778 7.39002 3.91459 10 3.91459Z"
                                fill="#EA4335" />
                        </svg>
                    </div>
                    <span class="tracking-tight">Continuar com o Google</span>
                </button>

                <div id="mensagem-erro"
                    class="hidden bg-red-900/10 border border-red-900/20 text-red-900 text-[11px] font-bold p-4 rounded-xl flex items-start gap-3 fade-in-up">
                    <span class="material-symbols-outlined text-lg shrink-0 mt-0.5">report</span>
                    <div class="flex flex-col gap-0.5">
                        <span class="uppercase tracking-wider">Acesso Negado</span>
                        <span id="texto-erro" class="font-medium text-red-900/80 normal-case">Seu e-mail não está
                            cadastrado no sistema.</span>
                    </div>
                </div>

                <div id="loading-state" class="hidden">
                    <div
                        class="flex items-center justify-center gap-2 text-secondary/60 text-xs font-bold uppercase tracking-widest animate-pulse">
                        <span class="block w-2 h-2 bg-secondary rounded-full animate-bounce"></span>
                        <span
                            class="block w-2 h-2 bg-secondary rounded-full animate-bounce [animation-delay:0.2s]"></span>
                        <span
                            class="block w-2 h-2 bg-secondary rounded-full animate-bounce [animation-delay:0.4s]"></span>
                        <span class="ml-2">Validando...</span>
                    </div>
                </div>
            </div>
        </div>
        <!-- Rodapé Corporativo -->
        <p class="text-center text-blue-200/50 text-[10px] mt-10 font-medium">
            &copy; 2026 CentraFin System by Grupo Soulan. Todos os direitos reservados.
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAHy6pN_agZ4DZDPDmJ580tUF4iTgX2siU",
            authDomain: "centra-fin.firebaseapp.com",
            projectId: "centra-fin",
            storageBucket: "centra-fin.firebasestorage.app",
            messagingSenderId: "666471089411",
            appId: "1:666471089411:web:4630f5b2ced70ceb981536"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const btnGoogle = document.getElementById('btn-google');
        const msgErro = document.getElementById('mensagem-erro');
        const txtErro = document.getElementById('texto-erro');
        const loadingState = document.getElementById('loading-state');

        // ROTEADOR PÓS-LOGIN — auditoria 2026-04-28
        // Avalia a matriz `permissoes.menus` (ou faz fallback ao array legado
        // `menus_permitidos`) e decide para qual tela redirecionar, seguindo a
        // hierarquia pedida na auditoria: Dashboard > Faturamento > Custo Folha
        // > Metas. Super Adm sempre vai pro Dashboard. Devolve null se o
        // usuário não tem nenhum menu permitido.
        function rotaPorPermissoes(userData) {
            if (!userData) return null;
            if (userData.perfil === 'super_admin') {
                return 'dashboard_master_desktop/code.html';
            }
            // Lê o formato novo, com fallback ao array legado (back-compat).
            let menus = userData.permissoes?.menus;
            if (!menus) {
                const arr = Array.isArray(userData.menus_permitidos) ? userData.menus_permitidos : [];
                menus = {
                    dashboardGeral:           arr.includes('dashboard_master'),
                    faturamento:              arr.includes('contas_receber'),
                    contasPagar:              arr.includes('contas_pagar'),
                    custoFolha:               arr.includes('custo_folha'),
                    metasFinanceiras:         arr.includes('metas'),
                    configuracoesPrivacidade: arr.includes('usuarios'),
                };
            }
            if (menus.dashboardGeral)   return 'dashboard_master_desktop/code.html';
            if (menus.faturamento)      return 'contas_a_receber_desktop/code.html';
            if (menus.contasPagar)      return 'contas_a_pagar_desktop/code.html';
            if (menus.custoFolha)       return 'custo_folha_desktop/code.html';
            if (menus.metasFinanceiras) return 'metas_desktop/code.html';
            // Super Adm-only entry — usuário comum não chega aqui pelo fluxo
            // normal, mas defensivamente: se for o único menu, leva pra lá.
            if (menus.configuracoesPrivacidade) return 'master.html';
            return null;
        }

        // Busca o doc do usuário com auto-migração de doc-por-UID → doc-por-email.
        async function carregarDocUsuario(user) {
            const emailKey = user.email.toLowerCase();
            let docRef = doc(db, "Usuarios", emailKey);
            let docSnap = await getDoc(docRef);
            if (!docSnap.exists()) {
                const uidRef = doc(db, "Usuarios", user.uid);
                const uidSnap = await getDoc(uidRef);
                if (uidSnap.exists()) {
                    console.log("[MIGRAÇÃO] Migrando doc de UID para e-mail:", emailKey);
                    const dados = uidSnap.data();
                    dados.email = emailKey;
                    dados.menus_permitidos = dados.menus_permitidos || [];
                    await setDoc(doc(db, "Usuarios", emailKey), dados);
                    await deleteDoc(uidRef);
                    docSnap = await getDoc(docRef);
                }
            }
            return docSnap;
        }

        // Decide o que fazer com um usuário JÁ autenticado: roteia para o 1º
        // módulo permitido, ou exibe erro de zero-permissões e desloga.
        async function rotearAposLogin(user) {
            const docSnap = await carregarDocUsuario(user);
            if (!docSnap.exists()) {
                await signOut(auth);
                showError("Acesso negado. Seu usuário não está cadastrado. Contate o administrador.");
                return;
            }
            const userData = docSnap.data();
            if (userData.status === 'inativo') {
                await signOut(auth);
                showError("Sua conta está inativa. Contate o administrador.");
                return;
            }
            const rota = rotaPorPermissoes(userData);
            if (!rota) {
                // Zero permissões — não há tela alvo. Avisa e desloga.
                await signOut(auth);
                showError("Seu usuário ainda não possui permissões de acesso. Contate o administrador.");
                return;
            }
            // Log de auditoria para perfis com restrição lateral por CC. Não
            // bloqueia o redirect — falha de log nunca trava o login.
            const ccsRestritos = Array.isArray(userData?.permissoes?.filtros?.centrosCusto)
                ? userData.permissoes.filtros.centrosCusto
                : [];
            if (ccsRestritos.length > 0 && userData.perfil !== 'super_admin') {
                addDoc(collection(db, "Logs"), {
                    usuario: userData.nome || userData.email || user.email,
                    acao: "ACESSO",
                    modulo: "Login (CC restrito)",
                    detalhes: `Login com restrição lateral por Centro de Custo: ${ccsRestritos.join(', ')}.`,
                    data_hora: serverTimestamp(),
                }).catch(e => console.warn('[Logs] Falha ao registrar acesso CC restrito:', e?.code || e?.message));
            }
            window.location.href = rota;
        }

        // Sessão pré-existente: se o navegador já está autenticado (refresh,
        // redirect vindo de uma página interna sem permissão, etc), roteia
        // imediatamente sem exigir novo clique no Google.
        onAuthStateChanged(auth, async (user) => {
            if (!user) return;
            try {
                btnGoogle.disabled = true;
                btnGoogle.classList.add('opacity-50', 'cursor-not-allowed');
                loadingState.classList.remove('hidden');
                await rotearAposLogin(user);
            } catch (err) {
                console.error("[Auto-route] Falha ao rotear sessão existente:", err);
                btnGoogle.disabled = false;
                btnGoogle.classList.remove('opacity-50', 'cursor-not-allowed');
                loadingState.classList.add('hidden');
            }
        });

        btnGoogle.addEventListener('click', async () => {
            msgErro.classList.add('hidden');
            btnGoogle.disabled = true;
            btnGoogle.classList.add('opacity-50', 'cursor-not-allowed');
            loadingState.classList.remove('hidden');
            try {
                const result = await signInWithPopup(auth, provider);
                await rotearAposLogin(result.user);
            } catch (error) {
                console.error("Erro na autenticação:", error);
                if (error.code !== 'auth/popup-closed-by-user') {
                    showError(`Erro técnico: ${error.code}`);
                }
                btnGoogle.disabled = false;
                btnGoogle.classList.remove('opacity-50', 'cursor-not-allowed');
                loadingState.classList.add('hidden');
            }
        });

        function showError(mensagem) {
            txtErro.textContent = mensagem;
            msgErro.classList.remove('hidden');
            // Cor Coral solicitada pelo design system (#FF8864) para "acesso negado".
            // Mantemos o tom vermelho atual; quando a copy traz "permissões", aplica
            // a paleta coral pra alinhar com o brand.
            const wrap = msgErro;
            const usaCoral = /permiss[oõ]es|zero|n[aã]o cadastrado|inativ[ao]/i.test(mensagem);
            if (usaCoral) {
                wrap.classList.remove('bg-red-900/10', 'border-red-900/20', 'text-red-900');
                wrap.classList.add('bg-[#FF8864]/15', 'border-[#FF8864]/40', 'text-[#FF8864]');
                txtErro.classList.remove('text-red-900/80');
                txtErro.classList.add('text-[#7a3a22]');
            }
            loadingState.classList.add('hidden');
            btnGoogle.disabled = false;
            btnGoogle.classList.remove('opacity-50', 'cursor-not-allowed');
        }
    </script>
</body>

</html>
