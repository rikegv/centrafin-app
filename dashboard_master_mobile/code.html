<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Geral - CentraFin</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@300,1&display=swap"
    rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Manrope', 'sans-serif'] },
          colors: { brandGreen: '#8bc34a', brandBlue: '#0284c7', brandRed: '#ef4444' }
        }
      }
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>

  <style>
    body {
      background-color: #f8fafc;
      color: #1e293b;
    }

    .tab-btn {
      position: relative;
      transition: all 0.3s ease;
    }

    .tab-btn::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0%;
      height: 3px;
      background-color: #8bc34a;
      transition: all 0.3s ease;
      border-radius: 3px 3px 0 0;
    }

    .tab-btn.active {
      color: #1e293b;
      font-weight: 800;
    }

    .tab-btn.active::after {
      width: 100%;
    }

    /* Evita que o mapa do Google quebre o layout */
    #chart-mapa-brasil {
      overflow: hidden;
    }
  </style>
</head>

<body class="min-h-screen flex antialiased bg-slate-50">

  <div id="sidebar-container"></div>

  <main class="flex-1 ml-[80px] w-full min-h-screen flex flex-col transition-all duration-300">

    <header
      class="bg-white border-b border-slate-200 sticky top-0 z-40 h-16 shadow-sm px-6 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <h1 class="text-lg font-extrabold tracking-wide text-slate-800">Dashboard Master</h1>
      </div>

      <nav class="flex gap-8 h-full">
        <button onclick="alternarTela('tela-faturamento', this)"
          class="tab-btn active h-full px-2 text-sm text-slate-500 hover:text-slate-800">Faturamento</button>
        <button onclick="alternarTela('tela-fluxo', this)"
          class="tab-btn h-full px-2 text-sm text-slate-500 hover:text-slate-800">Fluxo de Caixa</button>
        <button onclick="alternarTela('tela-rh', this)"
          class="tab-btn h-full px-2 text-sm text-slate-500 hover:text-slate-800">Simulador de RH</button>
      </nav>

      <div>
        <button
          class="bg-brandGreen text-white px-4 py-2 rounded-lg font-bold text-xs shadow-sm flex items-center gap-2 hover:bg-opacity-90">
          <span class="material-symbols-outlined text-[16px]">download</span> PDF
        </button>
      </div>
    </header>

    <div class="p-6 overflow-hidden">

      <div id="tela-faturamento" class="view-tela block space-y-6">
        <div class="flex gap-3">
          <button
            class="bg-brandGreen/10 text-green-700 border border-brandGreen/40 px-5 py-2 rounded-full text-xs font-bold shadow-sm">Visão
            Grupo Soulan</button>
          <button
            class="bg-white text-slate-500 border border-slate-200 hover:bg-slate-50 px-5 py-2 rounded-full text-xs font-bold shadow-sm">Visão
            Thomas / NEAT</button>
        </div>

        <div class="grid grid-cols-12 gap-6">
          <div class="col-span-8 bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
            <h2 class="text-sm font-bold text-slate-700 mb-4 flex items-center gap-2"><span
                class="material-symbols-outlined text-brandGreen">bar_chart</span> Faturamento Bruto vs Realizado</h2>
            <div id="chart-fat-anual" class="w-full h-[300px]"></div>
          </div>

          <div class="col-span-4 bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex flex-col">
            <h2 class="text-sm font-bold text-slate-700 mb-2 flex items-center gap-2"><span
                class="material-symbols-outlined text-brandGreen">map</span> Mapa de Faturamento</h2>
            <div id="chart-mapa-brasil" class="w-full flex-1 flex justify-center items-center"></div>
          </div>

          <div class="col-span-6 bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
            <h2 class="text-sm font-bold text-slate-700 mb-4 flex items-center gap-2"><span
                class="material-symbols-outlined text-brandGreen">analytics</span> Bruto vs Realizado por Serviço</h2>
            <div id="chart-fat-servico" class="w-full h-[300px]"></div>
          </div>

          <div class="col-span-6 bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
            <h2 class="text-sm font-bold text-slate-700 mb-4 flex items-center gap-2"><span
                class="material-symbols-outlined text-brandGreen">leaderboard</span> Faturamento por Comercial</h2>
            <div id="chart-fat-comercial" class="w-full h-[300px]"></div>
          </div>
        </div>
      </div>

      <div id="tela-fluxo" class="view-tela hidden">
        <div class="bg-white p-10 rounded-xl border border-slate-200 shadow-sm text-center">
          <span class="material-symbols-outlined text-6xl text-slate-300 mb-4">account_balance</span>
          <h2 class="text-xl font-bold text-slate-600">Módulo de Fluxo de Caixa</h2>
          <p class="text-slate-400">Em desenvolvimento base...</p>
        </div>
      </div>

      <div id="tela-rh" class="view-tela hidden">
        <div class="bg-white p-10 rounded-xl border border-slate-200 shadow-sm text-center">
          <span class="material-symbols-outlined text-6xl text-slate-300 mb-4">groups</span>
          <h2 class="text-xl font-bold text-slate-600">Simulador de RH</h2>
          <p class="text-slate-400">Em desenvolvimento base...</p>
        </div>
      </div>

    </div>
  </main>

  <script type="module">
    // 1. IMPORTAÇÕES FIREBASE (Ajuste o caminho '../' conforme seu projeto se necessário)
    import { auth, db } from "../firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { renderSidebar } from "../sidebar.js";

    // 2. VALIDAÇÃO DE SESSÃO
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const docRef = doc(db, "Usuarios", user.uid);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
          const dadosUser = docSnap.data();
          // Proteção de Rota (Se não for master, joga pro faturamento)
          if (dadosUser.perfil !== 'master') {
            window.location.href = "../contas_a_receber_desktop/code.html";
            return;
          }
          // Renderiza o Menu Lateral passando o perfil
          renderSidebar(dadosUser.perfil);
        }
      } else {
        window.location.href = "../login.html";
      }
    });

    // 3. NAVEGAÇÃO SPA (Telas)
    window.alternarTela = function (telaId, btnElement) {
      document.querySelectorAll('.view-tela').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(telaId).classList.remove('hidden');
      btnElement.classList.add('active');
      window.dispatchEvent(new Event('resize')); // Refaz gráficos
    };

    // 4. CONFIGURAÇÃO DOS GRÁFICOS (APEXCHARTS)
    const apexOptions = {
      chart: { foreColor: '#64748b', toolbar: { show: false }, background: 'transparent' },
      tooltip: { theme: 'light' },
      grid: { borderColor: '#e2e8f0', strokeDashArray: 4 },
      dataLabels: {
        enabled: true,
        style: { fontSize: '10px', fontWeight: 'bold' },
        formatter: function (val) { return "R$ " + val + "k"; } // Legenda com "R$ e K"
      }
    };

    // Gráfico A (Anual)
    new ApexCharts(document.querySelector("#chart-fat-anual"), {
      ...apexOptions,
      series: [
        { name: 'Bruto 2026', data: [11207, 8312, 6948, 6640, 6926, 7336] },
        { name: 'Real 2026', data: [9836, 8081, 6947, 6000, 6500, 7000] }
      ],
      chart: { type: 'bar', height: 300 },
      colors: ['#1e293b', '#94a3b8'], // Cores inspiradas no seu print
      plotOptions: { bar: { borderRadius: 2, columnWidth: '55%', dataLabels: { position: 'top' } } },
      dataLabels: { ...apexOptions.dataLabels, offsetY: -20, style: { colors: ['#8bc34a'] } },
      xaxis: { categories: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun'] },
      legend: { position: 'top' }
    }).render();

    // Gráfico C (Serviço)
    new ApexCharts(document.querySelector("#chart-fat-servico"), {
      ...apexOptions,
      series: [{ name: 'Bruto', data: [17300, 7900, 6900, 1300] }, { name: 'Real', data: [16900, 14900, 6870, 729] }],
      chart: { type: 'bar', height: 300 },
      colors: ['#1e293b', '#0284c7'],
      plotOptions: { bar: { borderRadius: 2, columnWidth: '60%', dataLabels: { position: 'top' } } },
      dataLabels: { ...apexOptions.dataLabels, offsetY: -20, style: { colors: ['#8bc34a'] } },
      xaxis: { categories: ['Temporário', 'Consultoria', 'Terceiros', 'NEAT'] }
    }).render();

    // Gráfico D (Comercial - Stacked)
    new ApexCharts(document.querySelector("#chart-fat-comercial"), {
      ...apexOptions,
      series: [
        { name: 'Temporário', data: [878, 249, 85, 420] },
        { name: 'Consultoria', data: [170, 110, 0, 147] },
        { name: 'Terceiros', data: [133, 302, 247, 0] }
      ],
      chart: { type: 'bar', height: 300, stacked: true },
      colors: ['#4c1d95', '#0284c7', '#7e22ce'], // Cores do seu print Looker
      plotOptions: { bar: { horizontal: true, borderRadius: 2 } },
      xaxis: { categories: ['Silvia D.', 'Tatiana O.', 'Catarina S.', 'Adriana S.'] },
      dataLabels: { enabled: true, formatter: function (val) { return val + "k"; } },
      legend: { position: 'right' }
    }).render();

    // 5. GOOGLE GEOCHARTS (MAPA DO BRASIL REAL)
    google.charts.load('current', { 'packages': ['geochart'] });
    google.charts.setOnLoadCallback(desenharMapa);

    function desenharMapa() {
      var data = google.visualization.arrayToDataTable([
        ['State', 'Faturamento'],
        ['BR-SP', 1852],
        ['BR-RJ', 118],
        ['BR-MG', 51],
        ['BR-RS', 31],
        ['BR-PR', 18]
      ]);

      var options = {
        region: 'BR', // Foca estritamente no Brasil
        resolution: 'provinces', // Mostra as divisas dos estados
        colorAxis: { colors: ['#e2e8f0', '#8bc34a', '#0284c7'] }, // Do cinza para o Verde/Azul
        backgroundColor: 'transparent',
        datalessRegionColor: '#f8fafc',
        defaultColor: '#f1f5f9',
        legend: 'none' // Remove a legenda padrão feia do google
      };

      var chart = new google.visualization.GeoChart(document.getElementById('chart-mapa-brasil'));
      chart.draw(data, options);
    }

    // Redesenha o mapa se a janela mudar de tamanho
    window.addEventListener('resize', desenharMapa);
  </script>
</body>

</html>
